{% extends "base.html" %}
{% block content %}
<div class="card shadow max-width-600 mx-auto border-0">
    <div class="card-header bg-success text-white text-center py-3"><h3>Edit Event & Photos</h3></div>
    <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3"><label class="fw-bold">Title</label><input type="text" name="titulo" class="form-control" value="{{ event.titulo }}" required></div>
            
            {% if event.fotos %}
            <div class="mb-3">
                <label class="fw-bold text-success">Manage Gallery (Click X to delete)</label>
                <div class="row g-2 mt-1">
                    {% for foto in event.fotos %}
                    <div class="col-4 position-relative">
                        <img src="{{ url_for('static', filename='uploads/' + foto) }}" class="img-fluid rounded border shadow-sm" style="height: 90px; width:100%; object-fit:cover;">
                        <a href="{{ url_for('delete_photo', event_id=event.id, filename=foto) }}" class="btn btn-danger btn-sm position-absolute top-0 end-0 m-1 rounded-circle" style="width:25px; height:25px; line-height:10px; padding:0;">&times;</a>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <div class="mb-3 p-3 border rounded bg-light">
                <label class="fw-bold text-success">Add More Photos</label>
                <input type="file" name="foto_evento" class="form-control" accept="image/*" multiple>
            </div>

            <div class="row">
                <div class="col-6 mb-3"><label class="fw-bold">Date</label><input type="date" name="fecha" class="form-control" value="{{ event.fecha }}" required></div>
                <div class="col-6 mb-3"><label class="fw-bold">Time</label><input type="time" name="hora" class="form-control" value="{{ event.hora }}"></div>
            </div>

            <div class="mb-3"><label class="fw-bold">Description</label><textarea name="descripcion" class="form-control" rows="2">{{ event.descripcion }}</textarea></div>
            <div class="mb-3"><label class="fw-bold">Chronicle</label><textarea name="noticia" class="form-control" rows="4">{{ event.noticia }}</textarea></div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1 fw-bold">SAVE ALL CHANGES</button>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
